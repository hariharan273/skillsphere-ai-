# Server Configuration
server.port=${PORT:8085}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/skillsphere_v2;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:password}
# Dialect is auto-detected by Spring Boot based on the JDBC URL

# H2 Console (LOCAL ONLY — to inspect stored hashes)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=lKCNofzLtui0aZBTjHtQsuilxYmMYAEAQbbAAy5S5GOgMoIpsRL/UY4rx0PD8lx+EQ==
jwt.expirationMs=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
