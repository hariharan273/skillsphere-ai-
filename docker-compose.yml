version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: skillsphere_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skillsphere
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: skillsphere_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/skillsphere?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - mysql-db

  frontend:
    build:
      context: ./frontend
    container_name: skillsphere_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql-data:
